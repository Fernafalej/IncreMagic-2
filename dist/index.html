<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IncreMagic</title>
    <style>
      /* ===== Reset & Basis ===== */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #2a1f0e;
        color: #c8a96e;
        font-family: monospace;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* ===== Canvas — Hintergrundbühne ===== */
      #game-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ===== HUD — oben links ===== */
      #hud-container {
        position: absolute;
        top: 1.2rem;
        left: 1.2rem;
        z-index: 10;
      }

      .hud {
        background: rgba(26, 18, 8, 0.82);
        border: 1px solid #5a3e1b;
        border-radius: 6px;
        padding: 0.75rem 1.1rem 0.6rem;
        min-width: 200px;
        backdrop-filter: blur(3px);
      }

      .hud-title {
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        color: #7a6040;
        text-transform: uppercase;
        margin-bottom: 0.55rem;
        border-bottom: 1px solid #3a2a10;
        padding-bottom: 0.35rem;
      }

      .hud-row {
        display: grid;
        grid-template-columns: 1.4rem 3.6rem 1fr auto;
        align-items: center;
        gap: 0.25rem;
        padding: 0.18rem 0;
      }

      .hud-symbol {
        font-size: 0.95rem;
        color: #c8960c;
      }

      .hud-name {
        font-size: 0.78rem;
        color: #8b6a30;
      }

      .hud-value {
        font-size: 0.92rem;
        color: #e8c87a;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .hud-rate {
        font-size: 0.72rem;
        color: #4ecdc4;
        text-align: right;
        min-width: 5.5rem;
        font-variant-numeric: tabular-nums;
        padding-left: 0.5rem;
      }

      .hud-tick {
        font-size: 0.62rem;
        color: #4a3820;
        margin-top: 0.5rem;
        text-align: right;
      }

      .hud-version {
        font-size: 0.62rem;
        color: #7a6040;
        margin-top: 0.25rem;
        text-align: center;
        font-style: italic;
      }

      /* ===== Titel (oben mittig) ===== */
      #game-title {
        position: absolute;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 1.5rem;
        color: #e8c87a;
        letter-spacing: 0.25em;
        text-shadow: 0 0 20px rgba(200, 150, 12, 0.4);
        pointer-events: none;
        user-select: none;
      }

      /* ===== Debug — kleine Ecke unten rechts ===== */
      #debug {
        position: absolute;
        bottom: 0.8rem;
        right: 0.8rem;
        z-index: 10;
        padding: 0.4rem 0.7rem;
        border: 1px solid #3a2810;
        border-radius: 4px;
        background: rgba(16, 10, 4, 0.75);
        font-size: 0.65rem;
        line-height: 1.6;
        color: #5a4020;
        min-width: 180px;
        opacity: 0.7;
      }

      #debug .label { color: #4a3418; }
      #debug .value { color: #2a8878; }

      /* ===== Golem-Panel — rechte Seite ===== */
      #golem-container {
        position: absolute;
        top: 1.2rem;
        right: 1.2rem;
        z-index: 10;
        width: 260px;
        max-height: calc(100vh - 2.4rem);
        overflow-y: auto;
        /* Dezenter Scrollbar */
        scrollbar-width: thin;
        scrollbar-color: #5a3e1b #1a120808;
      }

      .golem-panel {
        background: rgba(26, 18, 8, 0.82);
        border: 1px solid #5a3e1b;
        border-radius: 6px;
        padding: 0.75rem 1rem 0.75rem;
        backdrop-filter: blur(3px);
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.82rem;
      }

      .golem-section-title {
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        color: #7a6040;
        text-transform: uppercase;
        margin-bottom: 0.55rem;
        border-bottom: 1px solid #3a2a10;
        padding-bottom: 0.35rem;
      }

      .golem-section {
        margin-bottom: 0.6rem;
      }

      .golem-divider {
        border: none;
        border-top: 1px solid #3a2a10;
        margin: 0.55rem 0;
      }

      /* --- Golem-Liste --- */
      .golem-empty {
        color: #4a3820;
        font-size: 0.74rem;
        font-style: italic;
        padding: 0.2rem 0;
      }

      .golem-row {
        display: grid;
        grid-template-columns: 5rem 1fr auto;
        align-items: center;
        gap: 0.3rem;
        padding: 0.28rem 0;
        border-bottom: 1px solid #2a1e0e;
      }

      .golem-row:last-child {
        border-bottom: none;
      }

      .golem-row--corrupted {
        opacity: 0.5;
      }

      .golem-id {
        color: #8b6a30;
        font-size: 0.72rem;
        font-variant-numeric: tabular-nums;
      }

      .golem-order {
        font-size: 0.72rem;
        color: #5a4020;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .golem-order--active {
        color: #4ecdc4;
      }

      .golem-order--corrupted {
        color: #803030;
      }

      .golem-assign-btn {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 3px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.7rem;
        padding: 0.2rem 0.4rem;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.15s, color 0.15s;
      }

      .golem-assign-btn:hover:not(:disabled) {
        border-color: #c8960c;
        color: #e8c87a;
      }

      .golem-assign-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ===== Golem-Pool-Anzeige ===== */
      .golem-pool-count {
        color: #c8960c;
        font-size: 0.82rem;
        font-weight: bold;
        min-width: 2.2rem;
        text-align: right;
      }

      .golem-pool-name {
        font-size: 0.76rem;
        color: #c8a96e;
        flex: 1;
      }

      /* ===== Order-Queue-Panel ===== */
      #order-queue-container {
        position: absolute;
        top: calc(1.2rem + 400px); /* Below golem-container */
        right: 1.2rem;
        z-index: 10;
        width: 320px;
        max-height: calc(100vh - 2.4rem - 400px);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #5a3e1b #1a120808;
      }

      .order-queue-panel {
        background: rgba(26, 18, 8, 0.82);
        border: 1px solid #5a3e1b;
        border-radius: 6px;
        padding: 0.75rem 1rem 0.75rem;
        backdrop-filter: blur(3px);
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.82rem;
      }

      .order-queue-title {
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        color: #7a6040;
        text-transform: uppercase;
        margin-bottom: 0.55rem;
        border-bottom: 1px solid #3a2a10;
        padding-bottom: 0.35rem;
      }

      .order-queue-empty {
        color: #4a3820;
        font-size: 0.74rem;
        font-style: italic;
        padding: 0.2rem 0;
      }

      .order-queue-row {
        display: grid;
        grid-template-columns: 2rem 1fr auto auto;
        align-items: center;
        gap: 0.3rem;
        padding: 0.28rem 0;
        border-bottom: 1px solid #2a1e0e;
      }

      .order-queue-row:last-child {
        border-bottom: none;
      }

      .order-queue-priority {
        font-size: 0.72rem;
        color: #c8960c;
        text-align: center;
        font-weight: bold;
      }

      .order-queue-info {
        font-size: 0.72rem;
        color: #c8a96e;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .order-queue-repeat {
        font-size: 0.65rem;
        color: #4ecdc4;
        text-align: center;
      }

      .order-queue-repeat--off {
        color: #5a4020;
      }

      .order-queue-actions {
        display: flex;
        gap: 0.2rem;
      }

      .order-queue-btn {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 3px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.65rem;
        padding: 0.15rem 0.3rem;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.15s, color 0.15s;
      }

      .order-queue-btn:hover {
        border-color: #c8960c;
        color: #e8c87a;
      }

      .order-queue-btn--remove {
        border-color: #c84040;
        color: #c84040;
      }

      .order-queue-btn--remove:hover {
        border-color: #f06060;
        color: #f06060;
      }

      .order-queue-progress {
        margin-top: 0.5rem;
        width: 100%;
        height: 6px;
        background: rgba(42, 31, 14, 0.5);
        border-radius: 3px;
        overflow: hidden;
      }

      .order-queue-progress-bar {
        height: 100%;
        background: #4ecdc4;
        transition: width 0.2s;
      }

      .order-queue-add-form {
        margin-top: 0.5rem;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 0.3rem;
        align-items: center;
      }

      .order-queue-add-select {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 3px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.72rem;
        padding: 0.2rem 0.3rem;
      }

      .order-queue-add-input {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 3px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.72rem;
        padding: 0.2rem 0.3rem;
        width: 4rem;
      }

      .order-queue-add-btn {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 3px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.7rem;
        padding: 0.2rem 0.4rem;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }

      .order-queue-add-btn:hover {
        border-color: #4ecdc4;
        color: #4ecdc4;
      }

      /* ===== Sammel-Buttons ===== */
      .gather-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.35rem;
        margin-bottom: 0.2rem;
      }

      .gather-btn {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 4px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.78rem;
        padding: 0.35rem 0.4rem;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s, background 0.15s;
        text-align: center;
      }

      .gather-btn:hover {
        border-color: #c8960c;
        color: #e8c87a;
        background: rgba(90, 62, 27, 0.45);
      }

      .gather-btn:active {
        background: rgba(78, 205, 196, 0.12);
        border-color: #4ecdc4;
        color: #4ecdc4;
      }

      .gather-btn--fire {
        grid-column: 1 / -1;
        border-color: #7a3010;
        color: #c86030;
      }

      .gather-btn--fire:hover {
        border-color: #c84020;
        color: #f06040;
        background: rgba(120, 40, 10, 0.35);
      }

      /* ===== Crafting-Panel ===== */
      .crafting-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 0.3rem;
        padding: 0.28rem 0;
        border-bottom: 1px solid #2a1e0e;
      }

      .crafting-row:last-child {
        border-bottom: none;
      }

      .crafting-info {
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        min-width: 0;
      }

      .crafting-name {
        font-size: 0.76rem;
        color: #c8a96e;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .crafting-ingredients {
        font-size: 0.66rem;
        color: #5a4020;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .crafting-status {
        font-size: 0.66rem;
        color: #5a4020;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
        text-align: right;
        padding-right: 0.2rem;
      }

      .crafting-btn {
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #5a3e1b;
        border-radius: 3px;
        color: #c8a96e;
        font-family: monospace;
        font-size: 0.7rem;
        padding: 0.2rem 0.45rem;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.15s, color 0.15s, opacity 0.15s;
      }

      .crafting-btn:hover:not(:disabled) {
        border-color: #4ecdc4;
        color: #4ecdc4;
      }

      .crafting-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .crafting-btn--fail {
        border-color: #c84040 !important;
        color: #c84040 !important;
      }

      /* ===== Hauch des Lebens ===== */
      .breath-desc {
        font-size: 0.68rem;
        color: #5a4020;
        margin-bottom: 0.45rem;
        line-height: 1.4;
      }

      .breath-btn {
        width: 100%;
        background: rgba(42, 31, 14, 0.7);
        border: 1px solid #4a6a5a;
        border-radius: 4px;
        color: #4ecdc4;
        font-family: monospace;
        font-size: 0.8rem;
        padding: 0.4rem 0.6rem;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s, background 0.15s, opacity 0.15s;
        text-align: center;
      }

      .breath-btn:hover:not(:disabled) {
        border-color: #4ecdc4;
        background: rgba(78, 205, 196, 0.12);
        color: #6eddd8;
      }

      .breath-btn:active:not(:disabled) {
        background: rgba(78, 205, 196, 0.22);
      }

      .breath-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        color: #3a5a50;
        border-color: #2a3a30;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-FIq-4d1f.js"></script>
  </head>
  <body>
    <!-- Ressourcen-Kreise Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Spieltitel -->
    <div id="game-title">✦ INCREMAGIC ✦</div>

    <!-- HUD oben links -->
    <div id="hud-container"></div>

    <!-- Golem-Panel rechts oben -->
    <div id="golem-container"></div>

    <!-- Order-Queue-Panel rechts unten -->
    <div id="order-queue-container"></div>

    <!-- Debug-Info unten rechts (klein) -->
    <div id="debug">Initialisiere...</div>

  </body>
</html>
